# Define the server block
server {
    listen 5000;

    # Handle the main application route
    location /text-analyzer-ui {
        root /tetherfi/tetherfihome;
        try_files $uri $uri/ /text-analyzer-ui/index.html;
        index index.html;
    }

    # Handle static assets with proper caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
        root /tetherfi/tetherfihome;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Default location for root path
    location / {
        return 301 /text-analyzer-ui;
    }
}
